name: live-leaderboard

# Refresh the reference-bot leaderboard on real market data each weekday after the
# US close, and commit leaderboard.json. The site reads it. Manual run available too.
on:
  schedule:
    - cron: "0 22 * * 1-5" # ~17:00–18:00 ET, after market close, Mon–Fri (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install --quiet yfinance
      - name: Compute leaderboard
        run: python live_runner.py
      - name: Commit if changed
        run: |
          git config user.name "builderr-bot"
          git config user.email "noreply@builderr.ai"
          git add leaderboard.json
          git diff --staged --quiet || git commit -m "live leaderboard $(date -u +%FT%TZ)"
          git push
